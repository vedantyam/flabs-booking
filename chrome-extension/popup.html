<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body { width: 280px; padding: 16px; font-family: sans-serif; font-size: 14px; }
    h3 { margin: 0 0 12px; color: #1a1a1a; font-size: 16px; }
    .status { padding: 10px; border-radius: 8px; margin-bottom: 10px; }
    .status.idle { background: #f0fdf4; color: #166534; }
    .status.pending { background: #fefce8; color: #854d0e; }
    .status.complete { background: #f0fdf4; color: #166534; }
    .status.failed { background: #fef2f2; color: #991b1b; }
    .detail { font-size: 12px; color: #666; margin-top: 4px; }
    button { width: 100%; padding: 8px; background: #2563eb; color: white;
             border: none; border-radius: 6px; cursor: pointer; font-size: 13px; }
    button:hover { background: #1d4ed8; }
  </style>
</head>
<body>
  <h3>🗓 FLABS Demo Booking</h3>
  <div id="status" class="status idle">Ready to book demos</div>
  <div id="detail" class="detail"></div>
  <br>
  <button onclick="clearStatus()">Clear Status</button>
  <script src="popup.js"></script>
</body>
</html>
